<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>Fader &amp; Frame — Monogram</title>
  <desc>Square frame with grid ticks, central fader, and twin F bars.</desc>
  <defs>
    <style>
      .frame { stroke: #0F1115; fill: none; stroke-width: 20; }
      .tick { stroke: #9AA3AF; stroke-width: 10; stroke-linecap: round; }
      .glyph { fill: #0F1115; }
      .track { stroke: #0F1115; stroke-width: 14; stroke-linecap: round; }
      .knob { fill: #28C1D1; }
    </style>
  </defs>

  <!-- Outer square frame (with 24px corner radius) -->
  <rect x="36" y="36" width="440" height="440" rx="28" class="frame"/>

  <!-- Grid ticks at midpoints -->
  <line x1="256" y1="20" x2="256" y2="44" class="tick"/>
  <line x1="256" y1="468" x2="256" y2="492" class="tick"/>
  <line x1="20" y1="256" x2="44" y2="256" class="tick"/>
  <line x1="468" y1="256" x2="492" y2="256" class="tick"/>

  <!-- Left F -->
  <rect x="92" y="128" width="36" height="256" class="glyph"/>
  <rect x="92" y="128" width="140" height="36" class="glyph"/>
  <rect x="92" y="232" width="120" height="32" class="glyph"/>

  <!-- Right F -->
  <rect x="384" y="128" width="36" height="256" class="glyph"/>
  <rect x="288" y="128" width="132" height="36" class="glyph"/>
  <rect x="304" y="232" width="116" height="32" class="glyph"/>

  <!-- Center fader track -->
  <line x1="256" y1="128" x2="256" y2="352" class="track"/>

  <!-- Fader knob -->
  <circle cx="256" cy="248" r="30" class="knob"/>
</svg>
